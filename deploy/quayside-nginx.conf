# Quayside nginx config
# Replace YOUR_HOSTNAME with your DuckDNS subdomain (e.g. quayside.duckdns.org)
# or a real domain later — nothing else needs to change.

server {
    listen 80;
    server_name YOUR_HOSTNAME;

    # Certbot will add HTTPS redirect here automatically when you run:
    # certbot --nginx -d YOUR_HOSTNAME

    location / {
        proxy_pass http://unix:/run/quayside/quayside.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve uploaded files directly (bypasses gunicorn)
    location /uploads/ {
        alias /home/quayside/app/data/uploads/;
        internal;
    }

    client_max_body_size 20M;
}
