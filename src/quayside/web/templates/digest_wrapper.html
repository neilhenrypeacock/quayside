{% extends "base.html" %}
{% block title %}Daily Digest — {{ date }} — Quayside{% endblock %}

{% block head %}
<style>
    .digest-page-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        margin-bottom: 24px;
        padding-bottom: 20px;
        border-bottom: 1px solid var(--rule);
        gap: 24px;
    }
    .digest-page-header h1 {
        font-family: var(--font-serif);
        font-size: 28px;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-bottom: 6px;
    }
    .digest-page-header .meta {
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--muted);
        letter-spacing: 0.06em;
        line-height: 1.6;
    }
    .digest-page-header .digest-note {
        font-family: var(--font-mono);
        font-size: 10px;
        letter-spacing: 0.06em;
        color: var(--foam);
        background: var(--tide);
        padding: 6px 14px;
        border-radius: 2px;
        white-space: nowrap;
        flex-shrink: 0;
        align-self: center;
    }
    .digest-frame {
        background: #fff;
        border: 1px solid var(--rule);
        border-radius: 2px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(0,0,0,0.04);
    }
    .digest-frame > * {
        max-width: 100%;
    }
</style>
{% endblock %}

{% block content %}
<div class="digest-page-header">
    <div>
        <h1>Daily Digest</h1>
        <div class="meta">{{ date }} &middot; The same report sent to subscribers each morning</div>
    </div>
    <span class="digest-note">Delivered every weekday morning</span>
</div>
<div class="digest-frame">
    {{ digest_html|safe }}
</div>
{% endblock %}
