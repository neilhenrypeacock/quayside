{% extends "base.html" %}

{% block title %}{{ code }} — Quayside{% endblock %}

{% block content %}
<div style="max-width:480px;margin:120px auto;text-align:center;font-family:var(--font-sans);">
    <div style="font-size:72px;font-weight:700;color:var(--muted);line-height:1;">{{ code }}</div>
    <p style="margin-top:16px;font-size:18px;color:var(--ink-body);">{{ message }}</p>
    <a href="/" style="display:inline-block;margin-top:24px;color:var(--catch);text-decoration:none;font-size:14px;">Back to Quayside</a>
</div>
{% endblock %}
